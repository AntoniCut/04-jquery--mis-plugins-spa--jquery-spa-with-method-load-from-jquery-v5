<!DOCTYPE html>
<html lang="es">


<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Curso jQuery de escuela.it de Miguel Ángel Álvarez by AntonyDevTech Freelancer.">

       
    <!--  -----  Base del Proyecto  -----  -->

     <!--  -----  Favicon  -----  -->
     <link rel="icon" href="assets/favicon/jquery-icon.svg" type="image/svg+xml">

    <!--  ----------  Configuración móvil  ----------  -->
    <meta name="theme-color" content="#c3c4f9">
        
    <!--  -----  Themes jQuery UI  -----  -->
    <link rel="preload" href="app/libs/jquery/ui/themes/base/jquery-ui.min.css" as="style">
    <link rel="stylesheet" href="app/libs/jquery/ui/themes/base/jquery-ui.min.css" id="theme">

    <!--  -----  Styles Globales  -----  -----  -->

    <link rel="stylesheet" href="app/css/globals.css">

<body>
    

    <!--  ----------  LOADER  ----------  -->

        <h1 class="loader__title-main"> 
            &lt; jQuery SPA With Method Load From jQuery v5 /&gt; 
        </h1>

        <div class="spinner"> 
            <!--  *****  Spinner  *****  -->
        </div>

        <img
            class="loader__icon-jquery"
            src="assets/img/logos/jquery/jquery-loader.svg"
            alt="jQuery Animation Loader"
            width="300"
            height="300"
        >

        <h2 class="loader__title-main"> 
            &lt; Mis Plugins SPA /&gt;
        </h2>

    </div>


    <!--  ----------  LAYOUT  ----------  -->
    <div class="layout" id="layout">

        <header class="layout__header" id="layoutHeader">

        <!--  ----------  LAYOUT NAVBAR THEMES JQUERY UI  ----------  -->
        <nav class="layout__navbar draggable" id="layoutNavbarThemesUI">

        <main class="layout__main" id="layoutMain">

        <!--  ----------  LAYOUT FOOTER  ----------  -->
        <footer class="layout__footer" id="layoutFooter"> 
            <!--  *****  Renderizado del Footer  *****  -->
